<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  @keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }

// ── time helpers ───────────────────────────────────────────────────────────
const addMinutes = (timeStr, mins) => {
  const [h, m] = timeStr.split(":").map(Number);
  const total = h * 60 + m + mins;
  const nh = Math.floor(total / 60) % 24;
  const nm = total % 60;
  return `${String(nh).padStart(2,"0")}:${String(nm).padStart(2,"0")}`;
};
const fmt12 = (t) => {
  const [h, m] = t.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
};

// ── pool / match builders ──────────────────────────────────────────────────
const initPools = (players) => {
  const pools = [[], [], [], []];
  players.forEach((p, i) => pools[i % 4].push(p));
  return pools;
};

// Schedule logic:
// 4 pools per division — A,B on courtA&courtB; C,D on courtC&courtD
// Pool A → courtA, starts at base (7:00), games every 30 min: 7:00 / 7:30 / 8:00
// Pool B → courtB, starts +15 min (7:15), games every 30 min: 7:15 / 7:45 / 8:15
// Pool C → courtC (div.courtA for 2nd pair), same pattern as A
// Pool D → courtD, same pattern as B
// poolIndex 0=A,1=B,2=C,3=D
const makeMatchMeta = (pool, baseTime, poolIndex, courtA, courtB) => {
  const games = [
    { t1: [pool[0], pool[1]], t2: [pool[2], pool[3]] },
    { t1: [pool[0], pool[2]], t2: [pool[1], pool[3]] },
    { t1: [pool[0], pool[3]], t2: [pool[1], pool[2]] },
  ];
  // A(0)&B(1) share courtA; C(2)&D(3) share courtB
  // Within each pair: even index (A,C) starts at :00, odd (B,D) starts at :15
  const isOdd = poolIndex % 2 === 1;
  const court = poolIndex < 2 ? courtA : courtB;  // A&B→court1, C&D→court2
  const startOffset = isOdd ? 15 : 0;             // A&C at :00, B&D at :15
  const workingOffset = isOdd ? 0 : 15;            // work slot is the gap
  const workingTimes = [0,1,2].map(i => addMinutes(baseTime, workingOffset + i * 30));
  return games.map((g, i) => {
    const playing = [...g.t1, ...g.t2].map(p => p.id);
    const working = pool.filter(p => !playing.includes(p.id));
    const time = addMinutes(baseTime, startOffset + i * 30);
    return {
      id: `${pool[0].id}-g${i}`,
      t1: g.t1, t2: g.t2, working,
      allPoolPlayers: pool, // all 4 players in this pool
      score: [0, 0], history: [[0,0]],
      done: false, sideSwitch: false,
      court, time,
      workingTime: workingTimes[i],
      workingCourt: court,
    };
  });
};

const calcStandings = (pool, matches) => {
  const st = {};
  pool.forEach(p => { st[p.id] = { ...p, w:0, l:0, pd:0 }; });
  matches.forEach(m => {
    if (!m.done) return;
    const [s1,s2] = m.score; const w1 = s1>s2;
    m.t1.forEach(p => { st[p.id].w+=w1?1:0; st[p.id].l+=w1?0:1; st[p.id].pd+=s1-s2; });
    m.t2.forEach(p => { st[p.id].w+=w1?0:1; st[p.id].l+=w1?1:0; st[p.id].pd+=s2-s1; });
  });
  return Object.values(st).sort((a,b)=>b.w-a.w||b.pd-a.pd);
};

// ── Inline editable field ──────────────────────────────────────────────────
const Editable = ({ value, onChange, style={}, placeholder="" }) => {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = useRef();
  useEffect(()=>{ setVal(value); },[value]);
  if (editing) return (
    <input
      ref={ref} autoFocus value={val}
      onChange={e=>setVal(e.target.value)}
      onBlur={()=>{ setEditing(false); onChange(val||value); }}
      onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Escape"){ setEditing(false); onChange(val||value); }}}
      style={{ background:"#fff9e6", border:`1.5px solid ${C.gold}`, borderRadius:6,
        padding:"2px 6px", fontSize:"inherit", fontWeight:"inherit",
        color:C.dark, width:"100%", outline:"none", ...style }}
      placeholder={placeholder}
    />
  );
  return (
    <span onClick={()=>setEditing(true)} title="Tap to edit"
      style={{ cursor:"pointer", borderBottom:`1px dashed ${C.gold}66`, display:"inline-block",
        minWidth:40, ...style }}>
      {value || <span style={{color:"#aaa",fontStyle:"italic"}}>{placeholder}</span>}
    </span>
  );
};

// ── Score button ───────────────────────────────────────────────────────────
const SBtn = ({onClick,label,color,disabled}) => (
  <button className="scbtn" onClick={onClick} disabled={disabled} style={{
    width:46,height:46,borderRadius:10,
    background:disabled?"#ddd":color,
    color:"white",fontSize:22,fontWeight:900,
    border:"none",cursor:disabled?"default":"pointer",
    boxShadow:disabled?"none":`0 3px 0 ${color}88`,
    lineHeight:1, transition:"background .1s",
  }}>{label}</button>
);

// ── Working Team Badge (inside ScoreCard, shows working time) ─────────────
const WorkingTeam = ({ players, workingTime }) => {
  if (!players || players.length===0) return null;
  return (
    <div style={{ display:"flex", alignItems:"baseline", gap:6,
      padding:"5px 10px", marginTop:8,
      borderRadius:8, background:`${C.orange}10`,
      border:`1px solid ${C.orange}33` }}>
      <span style={{ fontSize:12, fontWeight:700, color:C.orange, whiteSpace:"nowrap" }}>
        {workingTime ? fmt12(workingTime)+" Working:" : "Working:"}
      </span>
      <span style={{ fontSize:11, fontWeight:300, color:C.dark, lineHeight:1.4 }}>
        {players.map(p=>p.name).join(" · ")}
      </span>
    </div>
  );
};

// ── Live Scoreboard card ───────────────────────────────────────────────────
const ScoreCard = ({ match, poolLabel, gameNum, onScore, onUndo, onEditCourt, onEditTime, adminMode=false, cap=15 }) => {
  const [s1,s2] = match.score;
  // cap passed as prop (15 for pool play, Infinity for final)
  const t1win = match.done && s1>s2;
  const t2win = match.done && s2>s1;
  const [editCourt,setEditCourt] = useState(false);
  const [editTime,setEditTime]   = useState(false);
  const [courtVal,setCourtVal]   = useState(match.court);
  const [timeVal,setTimeVal]     = useState(match.time);
  const [showSwitch, setShowSwitch] = useState(false);

  // Blink SWITCH SIDES for 7 seconds when sideSwitchAt changes
  useEffect(() => {
    if (!match.sideSwitchAt) { setShowSwitch(false); return; }
    const elapsed = Date.now() - match.sideSwitchAt;
    const remaining = 7000 - elapsed;
    if (remaining <= 0) { setShowSwitch(false); return; }
    setShowSwitch(true);
    const t = setTimeout(() => setShowSwitch(false), remaining);
    return () => clearTimeout(t);
  }, [match.sideSwitchAt]);

  return (
    <div style={{ background:C.dark, borderRadius:14, padding:13, marginBottom:12,
      border:`1.5px solid ${C.blue}33`, boxShadow:"0 3px 16px #0005" }}>

      {/* Prominent time + court bar */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        {/* BIG TIME — tap to edit */}
        {editTime ? (
          <input autoFocus type="time" value={timeVal} onChange={e=>setTimeVal(e.target.value)}
            onBlur={()=>{ setEditTime(false); onEditTime(timeVal); }}
            onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Escape"){ setEditTime(false); onEditTime(timeVal); }}}
            style={{ background:"#fff9e6", border:`2px solid ${C.gold}`, borderRadius:8,
              padding:"4px 8px", fontSize:20, fontWeight:900, color:C.dark, outline:"none", width:110 }} />
        ) : (
          <div onClick={()=>adminMode&&setEditTime(true)} style={{ cursor:adminMode?"pointer":"default" }}>
            <div style={{ color:C.white, fontSize:24, fontWeight:900, lineHeight:1, letterSpacing:.5 }}>
              {fmt12(match.time)}
            </div>
            {adminMode && <div style={{ color:`${C.blue}aa`, fontSize:10, fontWeight:600, marginTop:1 }}>tap to edit</div>}
          </div>
        )}

        {/* Right side: court + game label + status */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
    
            {/* Court — tap to edit */}
            {editCourt ? (
              <input autoFocus value={courtVal} onChange={e=>setCourtVal(e.target.value)}
                onBlur={()=>{ setEditCourt(false); onEditCourt(courtVal); }}
                onKeyDown={e=>{ if(e.key==="Enter"||e.key==="Escape"){ setEditCourt(false); onEditCourt(courtVal); }}}
                style={{ width:52, background:"#fff9e6", border:`1.5px solid ${C.gold}`,
                  borderRadius:6, padding:"2px 5px", fontSize:11, fontWeight:700, color:C.dark, outline:"none" }} />
            ) : (
              <span onClick={()=>adminMode&&setEditCourt(true)} style={{ fontSize:11, fontWeight:800, color:C.gold,
                background:`${C.gold}22`, borderRadius:6, padding:"2px 8px", cursor:"pointer" }}>
                Court {match.court}
              </span>
            )}
          </div>
          {showSwitch && !match.done && (
            <div style={{ background:C.gold, color:C.dark, fontWeight:800, fontSize:11,
              borderRadius:6, padding:"3px 10px", animation:"pulse 0.6s infinite",
              boxShadow:`0 0 12px ${C.gold}99` }}>⇄ SWITCH SIDES</div>
          )}
          {match.done && (
            <span style={{ background:C.green, color:"white", borderRadius:6,
              padding:"2px 10px", fontSize:11, fontWeight:800 }}>FINAL</span>
          )}
        </div>
      </div>

      {/* Team 1 — two players stacked, score+buttons span both rows */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
        <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
          {match.t1.map(p=>(
            <div key={p.id} style={{ color:t1win?C.gold:C.white,
              fontWeight:t1win?900:600, fontSize:t1win?14:12,
              lineHeight:1.6, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {p.name}
            </div>
          ))}

        </div>
        <div style={{ display:"flex", alignItems:"center", gap:5, flexShrink:0 }}>
          <SBtn onClick={()=>onScore(match.id,0,-1)} label="−" color={C.navy} disabled={match.done||s1===0}/>
          <div style={{ width:40,textAlign:"center",fontSize:28,fontWeight:900,
            color:t1win?C.gold:C.white,fontVariantNumeric:"tabular-nums",lineHeight:1 }}>{s1}</div>
          <SBtn onClick={()=>onScore(match.id,0,1)} label="+" color={C.blue} disabled={match.done||(cap!==Infinity&&s1>=cap)}/>
        </div>
      </div>

      {/* VS divider */}
      <div style={{ display:"flex", alignItems:"center", gap:6, margin:"6px 0" }}>
        <div style={{ flex:1, height:1, background:`${C.blue}44` }}/>
        <span style={{ fontSize:9, fontWeight:900, color:`${C.blue}88`, letterSpacing:1 }}>VS</span>
        <div style={{ flex:1, height:1, background:`${C.blue}44` }}/>
      </div>

      {/* Team 2 — two players stacked */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:4 }}>
        <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
          {match.t2.map(p=>(
            <div key={p.id} style={{ color:t2win?C.gold:C.white,
              fontWeight:t2win?900:600, fontSize:t2win?14:12,
              lineHeight:1.6, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {p.name}
            </div>
          ))}

        </div>
        <div style={{ display:"flex", alignItems:"center", gap:5, flexShrink:0 }}>
          <SBtn onClick={()=>onScore(match.id,1,-1)} label="−" color={C.navy} disabled={match.done||s2===0}/>
          <div style={{ width:40,textAlign:"center",fontSize:28,fontWeight:900,
            color:t2win?C.gold:C.white,fontVariantNumeric:"tabular-nums",lineHeight:1 }}>{s2}</div>
          <SBtn onClick={()=>onScore(match.id,1,1)} label="+" color={C.blue} disabled={match.done||(cap!==Infinity&&s2>=cap)}/>
        </div>
      </div>

      <WorkingTeam players={match.working} workingTime={match.workingTime}/>

      {(match.history||[]).length > 1 && !match.done && (
        <button onClick={()=>onUndo(match.id)} style={{
          marginTop:8, background:"transparent",
          border:`1px solid ${C.blue}66`,
          color:C.blue,
          borderRadius:7, padding:"4px 12px", fontSize:11,
          cursor:"pointer", width:"100%", fontWeight:600 }}>
          ↩ Undo Last Point
        </button>
      )}
      {(match.history||[]).length > 1 && match.done && adminMode && (
        <button onClick={()=>onUndo(match.id)} style={{
          marginTop:8, background:`${C.red}22`,
          border:`1px solid ${C.red}66`,
          color:C.red,
          borderRadius:7, padding:"4px 12px", fontSize:11,
          cursor:"pointer", width:"100%", fontWeight:800 }}>
          ↩ Undo Final Point (Error Correction)
        </button>
      )}
    </div>
  );
};

const PoolView = ({ pools, matches, setMatches, label, players, onRenamePlayer, phase, adminMode=false }) => {
  const [activePool, setActivePool] = useState(0);
  const [subTab, setSubTab] = useState("games"); // games | roster

  const applyToMatch = (matchId, fn) => {
    setMatches(prev => prev.map(pool => pool.map(m => m.id===matchId ? fn(m) : m)));
  };

  const handleScore = (matchId, teamIdx, delta) => {
    applyToMatch(matchId, m => {
      const s = [...m.score];
      s[teamIdx] = Math.max(0, s[teamIdx]+delta);
      const justHit8 = !m.sideSwitch && (s[0]>=8||s[1]>=8);
      const switched = (s[0]>=8||s[1]>=8);
      const done = s[0]>=15||s[1]>=15;
      const history = [...(m.history||[[0,0]]), [...s]];
      // sideSwitchAt: timestamp when 8 was first reached (for 7s blink timer)
      const sideSwitchAt = justHit8 ? Date.now() : (m.sideSwitchAt||null);
      return {...m, score:s, sideSwitch:switched, sideSwitchAt, done, history};
    });
  };

  const handleUndo = (matchId) => {
    applyToMatch(matchId, m => {
      const hist = [...(m.history||[[0,0]])];
      if (hist.length<=1) return m;
      hist.pop();
      const prev = hist[hist.length-1];
      const stillSwitched = prev[0]>=8||prev[1]>=8;
      return {...m, score:[...prev], done:false,
        sideSwitch:stillSwitched,
        sideSwitchAt: stillSwitched ? m.sideSwitchAt : null,
        history:hist};
    });
  };

  const handleEditCourt = (matchId, val) => {
    applyToMatch(matchId, m => ({...m, court:val}));
  };
  const handleEditWorkingCourt = (matchId, val) => {
    applyToMatch(matchId, m => ({...m, workingCourt:val}));
  };
  const handleEditTime = (matchId, val) => {
    applyToMatch(matchId, m => ({...m, time:val}));
  };

  const poolStandings = calcStandings(pools[activePool], matches[activePool]);

  return (
    <div style={{ padding:14 }}>
      {/* Pool tabs */}
      <div style={{ display:"flex", gap:5, marginBottom:10 }}>
        {pools.map((pool,pi)=>(
          <button key={pi} onClick={()=>setActivePool(pi)} style={{
            flex:1,padding:"7px 4px",borderRadius:9,border:"none",
            background:activePool===pi?C.navy:C.gray,
            color:activePool===pi?C.white:C.dark,
            fontWeight:800,fontSize:12,cursor:"pointer" }}>
            Pool {String.fromCharCode(65+pi)}
          </button>
        ))}
      </div>

      {/* Sub tabs */}
      <div style={{ display:"flex", gap:5, marginBottom:10 }}>
        {["games",...(adminMode?["roster"]:[]),"standings"].map(t=>(
          <button key={t} onClick={()=>setSubTab(t)} style={{
            flex:1,padding:"6px 4px",borderRadius:8,border:"none",
            background:subTab===t?C.blue:"#e8eef4",
            color:subTab===t?C.white:C.dark,
            fontWeight:700,fontSize:11,cursor:"pointer",textTransform:"capitalize" }}>
            {t==="games"?"🎮 Games":t==="roster"?"✏️ Roster":"🏅 Pool Stnd"}
          </button>
        ))}
      </div>

      {subTab==="games" && (
        <>
          {(() => {
            const pool = pools[activePool];
            const poolMatches = matches[activePool];
            const poolLabel = `${label} · Pool ${String.fromCharCode(65+activePool)}`;

            // Build merged chronological schedule:
            // 3 game slots + 3 working slots, interleaved by time
            const gameSlots = poolMatches.map((m,mi) => ({
              type:"game", time:m.time, match:m, gameNum:mi+1,
            }));
            // Working slots: each game's working players + their dedicated time
            const workSlots = poolMatches.map((m,mi) => {
              // Use updated player names from players state
              const updatedPool = pool.map(p => {
                const updated = players.find(up => up.id === p.id);
                return updated || p;
              });
              return {
                type:"work", time:m.workingTime, court:m.workingCourt||m.court,
                matchId:m.id, players:m.working,
                workingIds: m.working.map(w=>w.id),
                allPlayers: updatedPool, gameNum:mi+1,
              };
            });
            const allSlots = [...gameSlots, ...workSlots].sort((a,b) => {
              const [ah,am] = a.time.split(":").map(Number);
              const [bh,bm] = b.time.split(":").map(Number);
              return (ah*60+am) - (bh*60+bm);
            });

            return allSlots.map((slot, si) => {
              if (slot.type === "game") {
                return (
                  <ScoreCard key={`game-${slot.gameNum}`} match={slot.match}
                    poolLabel={poolLabel}
                    gameNum={slot.gameNum}
                    onScore={handleScore}
                    onUndo={handleUndo}
                    onEditCourt={v=>handleEditCourt(slot.match.id,v)}
                    onEditTime={v=>handleEditTime(slot.match.id,v)}
                    adminMode={adminMode}
                  />
                );
              } else {
                // Working slot — slim row with editable court
                return (
                  <WorkingSlotRow key={`work-${slot.gameNum}`} slot={slot}
                    onEditCourt={v=>handleEditWorkingCourt(slot.matchId,v)} adminMode={adminMode}/>
                );
              }
            });
          })()}
        </>
      )}

      {subTab==="roster" && (
        <RosterEditor
          players={pools[activePool]}
          onRename={(pid,name)=>onRenamePlayer(pid,name)}
        />
      )}

      {subTab==="standings" && (
        <StandingsTable rows={poolStandings}/>
      )}
    </div>
  );
};

// ── TD View (Admin only) — all courts, all divisions ─────────────────────
const TDView = ({ divisionStates, players1, players2 }) => {
  // divisionStates: [{name, phase, r1Matches, r2Matches, players, onScore, onUndo}, ...]

  // Collect all active matches from all divisions
  const getAllSlots = () => {
    const slots = [];
    divisionStates.forEach((ds, di) => {
      if (!ds) return;
      const pools   = ds.phase==="r1" ? ds.r1Pools   : ds.r2Pools;
      const matches = ds.phase==="r1" ? ds.r1Matches  : ds.r2Matches;
      if (!matches) return;

      matches.forEach((poolMatches, pi) => {
        poolMatches.forEach(m => {
          const resolve = p => { const up=(ds.players||[]).find(u=>u.id===p.id); return up?{...p,name:up.name}:p; };

          // Game slot
          slots.push({ type:"game", time:m.time, match:{
            ...m, t1:m.t1.map(resolve), t2:m.t2.map(resolve),
          }, divName:ds.name, di, onScore:ds.onScore, onUndo:ds.onUndo, players:ds.players });

          // Working slot — all 4 players in this pool keep score at workingTime
          if (m.workingTime) {
            // Reconstruct all 4 pool players from t1+t2+working
            const all4 = [...(m.t1||[]), ...(m.t2||[]), ...(m.working||[])];
            const seen = new Set();
            const unique = all4.filter(p=>{ if(seen.has(p.id))return false; seen.add(p.id); return true; });
            // Also try pools state if available
            const fromPools = pools && pools[pi] ? pools[pi] : unique;
            const resolved = fromPools.map(resolve);
            slots.push({
              type:"work", time:m.workingTime, court:m.workingCourt||m.court,
              workers:resolved, divName:ds.name, players:ds.players
            });
          }
        });
      });
    });
    return slots;
  };

  const allSlots = getAllSlots();
  // Time strip only shows game times (not working slot times)
  const gameTimes = [...new Set(allSlots.filter(s=>s.type==="game").map(s=>s.time).filter(Boolean))].sort();
  // All unique times (games + working) for court grid
  const times = gameTimes;
  const firstActive = times.find(t => allSlots.filter(s=>s.match?.time===t).some(s=>!s.match?.done));
  const [activeTime, setActiveTime] = useState(firstActive||times[0]);
  const [editScore, setEditScore] = useState(null); // {matchId, ti, value, onScore}

  const pname = (p, players) => {
    const up = (players||[]).find(u=>u.id===p.id);
    return up ? up.name : p.name;
  };

  const slotsAtTime = allSlots.filter(s => s.time === activeTime);

  // Group by court
  const courts = [...new Set(slotsAtTime.map(s=>s.match?.court||s.court))].sort((a,b)=>Number(a)-Number(b));

  const handleDirectScore = (matchId, ti, val, onScore) => {
    const num = parseInt(val);
    setEditScore(null);
    if (isNaN(num) || num < 0 || !onScore) return;
    onScore(matchId, ti, num, true);
  };

  return (
    <div style={{padding:12}}>
      {/* Time strip */}
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
        {gameTimes.map(t=>{
          const done = allSlots.filter(s=>s.type==="game"&&s.time===t).every(s=>s.match?.done);
          const active = t===activeTime;
          return (
            <button key={t} onClick={()=>setActiveTime(t)} style={{
              flexShrink:0,padding:"7px 14px",borderRadius:8,border:"none",
              cursor:"pointer",fontWeight:800,fontSize:13,
              background:active?C.navy:done?"#E5E7EB":"#F3F4F6",
              color:active?C.white:done?"#9CA3AF":C.dark,
              boxShadow:active?`0 2px 8px ${C.navy}44`:"none",
            }}>{fmt12(t)}</button>
          );
        })}
      </div>

      {/* Court cards — pair courts: 1&2 side by side, 3&4 side by side */}
      {[courts.slice(0,2), courts.slice(2,4)].filter(pair=>pair.length>0).map((pair,pairIdx) => (
        <div key={pairIdx} style={{marginBottom:14}}>

          {/* Slots for this pair — zip court A slots and court B slots */}
          {(()=>{
            // Sort so game slots always on left, working slots always on right
            const allCourtSlots = pair.map(court => slotsAtTime.filter(s=>(s.match?.court||s.court)===court));
            const gameSlotsList = allCourtSlots.flat().filter(s=>s.type==="game");
            const workSlotsList = allCourtSlots.flat().filter(s=>s.type==="work");
            const slotsByCourt = [gameSlotsList, workSlotsList];
            const maxSlots = Math.max(...slotsByCourt.map(s=>s.length));
            return Array.from({length:maxSlots}).map((_,si)=>(
              <div key={si} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                {slotsByCourt.map((courtSlots, ci) => {
                  const slot = courtSlots[si];
                  if (!slot) return <div key={ci}/>;
                  // Always show game on left, working on right
                  // If this column has a work slot but other has game, skip here — handled by sorting
                  if (slot.type==="work") return (
                    <div key={ci} style={{background:`${C.orange}10`,
                      border:`1.5px solid ${C.orange}44`,borderRadius:10,padding:10}}>
                      <div style={{fontSize:11,fontWeight:900,color:C.orange,marginBottom:3}}>
                        Court {slot.court}
                      </div>
                      <div style={{fontSize:9,fontWeight:800,color:C.orange,
                        textTransform:"uppercase",marginBottom:6}}>
                        📋 Working · {slot.divName.replace("Girls ","")}
                      </div>
                      {(slot.workers||[]).length > 0
                        ? (slot.workers||[]).map(p=>(
                            <div key={p.id} style={{fontSize:12,fontWeight:700,
                              color:C.dark,lineHeight:1.7,
                              background:`${C.orange}18`,borderRadius:5,
                              padding:"2px 7px",marginBottom:3}}>
                              {pname(p,slot.players)}
                            </div>
                          ))
                        : <div style={{fontSize:11,color:"#9CA3AF"}}>—</div>
                      }
                    </div>
                  );
                  const m = slot.match;
                  const [s1,s2] = m.score;
                  const t1win=m.done&&s1>s2, t2win=m.done&&s2>s1;
                  return (
                    <div key={ci} style={{background:C.dark,borderRadius:10,padding:10,
                      border:`1.5px solid ${m.done?C.green:C.blue}33`}}>
                      <div style={{fontSize:11,fontWeight:900,color:C.gold,marginBottom:3}}>
                        Court {slot.match.court}
                      </div>
                      <div style={{fontSize:9,fontWeight:700,color:`${C.gold}99`,
                        textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>
                        {slot.divName.replace("Girls ","")}
                        {m.done && <span style={{color:C.green,marginLeft:4}}>✓</span>}
                      </div>
                      {m.sideSwitchAt && !m.done && (
                        <div style={{background:C.gold,color:C.dark,fontWeight:800,
                          fontSize:9,borderRadius:4,padding:"1px 6px",
                          textAlign:"center",marginBottom:4,
                          animation:"pulse 0.6s infinite"}}>⇄ SWITCH</div>
                      )}
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                        <div style={{flex:1,minWidth:0,paddingRight:4}}>
                          {m.t1.map(p=>(
                            <div key={p.id} style={{fontSize:10,fontWeight:t1win?800:500,
                              color:t1win?C.gold:C.white,lineHeight:1.4,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                              {pname(p,slot.players)}
                            </div>
                          ))}
                        </div>
                        {editScore&&editScore.matchId===m.id&&editScore.ti===0 ? (
                          <input autoFocus type="number" defaultValue={s1}
                            style={{width:36,fontSize:18,fontWeight:900,textAlign:"center",
                              background:"#fff9e6",border:`2px solid ${C.gold}`,
                              borderRadius:6,color:C.dark,outline:"none",padding:"1px"}}
                            onBlur={e=>{handleDirectScore(m.id,0,e.target.value,slot.onScore);}}
                            onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();handleDirectScore(m.id,0,e.target.value,slot.onScore);}}}/>
                        ) : (
                          <div onClick={()=>!m.done&&setEditScore({matchId:m.id,ti:0})}
                            style={{fontSize:22,fontWeight:900,minWidth:28,textAlign:"center",
                              color:t1win?C.gold:C.white,cursor:m.done?"default":"pointer",
                              borderBottom:m.done?"none":`1px dashed ${C.blue}55`}}>
                            {s1}
                          </div>
                        )}
                      </div>
                      <div style={{height:1,background:`${C.blue}2a`,margin:"2px 0"}}/>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:3}}>
                        <div style={{flex:1,minWidth:0,paddingRight:4}}>
                          {m.t2.map(p=>(
                            <div key={p.id} style={{fontSize:10,fontWeight:t2win?800:500,
                              color:t2win?C.gold:C.white,lineHeight:1.4,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                              {pname(p,slot.players)}
                            </div>
                          ))}
                        </div>
                        {editScore&&editScore.matchId===m.id&&editScore.ti===1 ? (
                          <input autoFocus type="number" defaultValue={s2}
                            style={{width:36,fontSize:18,fontWeight:900,textAlign:"center",
                              background:"#fff9e6",border:`2px solid ${C.gold}`,
                              borderRadius:6,color:C.dark,outline:"none",padding:"1px"}}
                            onBlur={e=>{handleDirectScore(m.id,1,e.target.value,slot.onScore);}}
                            onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();handleDirectScore(m.id,1,e.target.value,slot.onScore);}}}/>
                        ) : (
                          <div onClick={()=>!m.done&&setEditScore({matchId:m.id,ti:1})}
                            style={{fontSize:22,fontWeight:900,minWidth:28,textAlign:"center",
                              color:t2win?C.gold:C.white,cursor:m.done?"default":"pointer",
                              borderBottom:m.done?"none":`1px dashed ${C.blue}55`}}>
                            {s2}
                          </div>
                        )}
                      </div>
                      {!m.done && (
                        <button onClick={()=>slot.onUndo(m.id)} style={{
                          marginTop:6,background:"transparent",
                          border:`1px solid ${C.blue}33`,color:`${C.blue}bb`,
                          borderRadius:5,padding:"2px 8px",fontSize:9,
                          cursor:"pointer",width:"100%"}}>↩ Undo</button>
                      )}
                    </div>
                  );
                })}
              </div>
            ));
          })()}
        </div>
      ))}
    </div>
  );
};

    const load = async () => {
      try {
        const rows = await sbFetch('GET', `/rest/v1/scores?event=eq.${eventId}&division=eq.${divKey}&select=*`, null);
        if (rows && rows.length > 0) {
          const data = rows[0].data;
          if (data.phase) setPhase(data.phase);
          if (data.r1Matches) setR1Matches(data.r1Matches);
          if (data.r2Pools) setR2Pools(data.r2Pools);
          if (data.r2Matches) setR2Matches(data.r2Matches);
          if (data.finalMatch) setFinalMatch(data.finalMatch);
        }
      } catch(e) {}
      setLoading(false);
    };
    // Show app immediately, load in background
    setTimeout(load, 100);
    const interval = setInterval(load, 5000);
    return () => clearInterval(interval);
  }, []);

  // ── Save to Supabase whenever scores change ────────────────────────────
  const saveToSupabase = async (data) => {
    await sbFetch('POST', '/rest/v1/scores', {
      id: eventId + '-' + divKey,
      event: eventId,
      division: divKey,
      data,
      updated_at: new Date().toISOString(),
    });
  };

  // Dummy save fn for compatibility
  const save = () => {};
  const loadSaved = (key, fallback) => fallback;

  // ── Broadcast state to parent (for TD view) ───────────────────────────
  useEffect(()=>{
    if(!onStateChange) return;
    onStateChange({
      name:div.name, phase, players,
      r1Pools, r1Matches, r2Pools, r2Matches,
      onScore:(matchId,ti,delta,direct)=>{
        const applyScore=(prev,isDirect)=>prev.map(pool=>pool.map(m=>{
          if(m.id!==matchId)return m;
          const s=[...m.score];
          if(isDirect){ s[ti]=Math.max(0,delta); }
          else { s[ti]=Math.max(0,s[ti]+delta); }
          const justHit8=!m.sideSwitch&&(s[0]>=8||s[1]>=8);
          const sideSwitchAt=justHit8?Date.now():(m.sideSwitchAt||null);
          const done=s[0]>=15||s[1]>=15;
          return {...m,score:s,sideSwitch:s[0]>=8||s[1]>=8,sideSwitchAt,done,
            history:[...(m.history||[[0,0]]),[...s]]};
        }));
        if(phase==="r1") setR1Matches(prev=>applyScore(prev,direct));
        else if(phase==="r2"&&r2Matches) setR2Matches(prev=>applyScore(prev,direct));
      },
      onUndo:(matchId)=>{
        const undoFn=prev=>prev.map(pool=>pool.map(m=>{
          if(m.id!==matchId)return m;
          const hist=[...(m.history||[[0,0]])];
          if(hist.length<=1)return m;
          hist.pop();
          const p=hist[hist.length-1];
          return {...m,score:[...p],done:false,sideSwitch:p[0]>=8||p[1]>=8,history:hist};
        }));
        if(phase==="r1") setR1Matches(undoFn);
        else if(phase==="r2") setR2Matches(undoFn);
      }
    });
  },[phase,players,r1Matches,r2Matches]);

  // ── Auto-save to Supabase whenever state changes ─────────────────────
  useEffect(()=>{
    if(loading) return;
    saveToSupabase({ phase, r1Matches, r2Pools, r2Matches, finalMatch });
  }, [r1Matches, r2Matches, finalMatch, phase, loading]);

  const renamePlayer = (pid, name) => {
    setPlayers(prev => {
      const next = prev.map(p => p.id===pid?{...p,name}:p);
      save('players', next);
      return next;
    });
    // propagate into all matches
    const rename = arr => arr.map(pool=>pool.map(m=>({
      ...m,
      t1:m.t1.map(p=>p.id===pid?{...p,name}:p),
      t2:m.t2.map(p=>p.id===pid?{...p,name}:p),
      working:m.working.map(p=>p.id===pid?{...p,name}:p),
    })));
    setR1Matches(prev=>rename(prev));
    if(r2Matches) setR2Matches(prev=>rename(prev));
    if(finalMatch) setFinalMatch(prev=>({
      ...prev,
      t1:prev.t1.map(p=>p.id===pid?{...p,name}:p),
      t2:prev.t2.map(p=>p.id===pid?{...p,name}:p),
    }));
  };



  const r1Done = r1Matches.every(pool=>pool.every(m=>m.done));
  const r2Done = r2Matches&&r2Matches.every(pool=>pool.every(m=>m.done));

  const advanceR2 = () => {
    const standings = r1Pools.map((pool,pi)=>
      calcStandings(pool,r1Matches[pi]).map((p,rank)=>({...p,r1Rank:rank+1}))
    );
    // R2 rotation: R2 pool r2pi, slot si → place=(r2pi+si)%4 from R1 pool si
    // R2-A: 1st-A, 2nd-B, 3rd-C, 4th-D
    // R2-B: 2nd-A, 3rd-B, 4th-C, 1st-D
    // R2-C: 3rd-A, 4th-B, 1st-C, 2nd-D
    // R2-D: 4th-A, 1st-B, 2nd-C, 3rd-D
    // Sort each R2 pool by r1Rank so 1st place = player 1, 2nd = player 2, etc.
    const newPools = [0,1,2,3].map(r2pi=>
      [0,1,2,3].map(si => standings[si][(r2pi + si) % 4])
        .sort((a,b) => a.r1Rank - b.r1Rank)
    );
    setR2Pools(newPools);
    setR2Matches(newPools.map((pool,pi)=>makeMatchMeta(
      pool, addMinutes(div.startTime,90), pi,
      div.courtA, div.courtB  // same court logic: A&B→courtA, C&D→courtB
    )));
    setPhase("r2"); setMainTab("score");
  };

  const advanceFinal = () => {
    // Merge R1+R2 standings to get true overall top 2
    const r1rows = r1Pools.map((pool,pi)=>calcStandings(pool,r1Matches[pi])).flat();
    const r2rows = r2Pools.map((pool,pi)=>calcStandings(pool,r2Matches[pi])).flat();
    const m={};
    [...r1rows,...r2rows].forEach(p=>{
      if(!m[p.id]){m[p.id]={...p};}
      else{m[p.id].w+=p.w;m[p.id].l+=p.l;m[p.id].pd+=p.pd;}
    });
    const sorted=Object.values(m).sort((a,b)=>b.w-a.w||b.pd-a.pd);
    setFinalMatch({
      id:"final", t1:[sorted[0]], t2:[sorted[1]],
      score:[0,0], history:[[0,0]], done:false,
      court:div.courtA, time:addMinutes(div.startTime,180), working:[], workingTime:null
    });
    setPhase("final"); setMainTab("score");
  };

  const handleFinalScore=(id,ti,delta)=>{
    setFinalMatch(prev=>{
      const s=[...prev.score];
      s[ti]=Math.max(0,s[ti]+delta);
      const total=s[0]+s[1];
      // Switch sides every 7 total points — store timestamp for ScoreCard blink
      const justHit7 = !prev.sideSwitch && total>0 && total%7===0;
      const sideSwitchAt = justHit7 ? Date.now() : (prev.sideSwitchAt||null);
      // Reset sideSwitch flag after each 7-point interval so it can fire again
      const sideSwitch = total%7===0 && total>0;
      // Win by 2, first to 21 minimum, no cap
      const done = (s[0]>=21||s[1]>=21) && Math.abs(s[0]-s[1])>=2;
      return {...prev,score:s,done,sideSwitch,sideSwitchAt,
        history:[...(prev.history||[[0,0]]),s]};
    });
  };
  const handleFinalUndo=()=>{
    setFinalMatch(prev=>{
      const hist=[...(prev.history||[[0,0]])];
      if(hist.length<=1)return prev;
      hist.pop();
      const p=hist[hist.length-1];
      const total=p[0]+p[1];
      const sideSwitch=total%7===0&&total>0;
      return {...prev,score:[...p],done:false,sideSwitch,
        sideSwitchAt:sideSwitch?prev.sideSwitchAt:null,history:hist};
    });
  };

  const getOverallStandings = () => {
    // Always use updated player names from players state
    const updatedPool = (pool) => pool.map(p => {
      const up = players.find(u => u.id===p.id);
      return up ? {...p, name:up.name} : p;
    });
    const r1rows = r1Pools.map((pool,pi)=>calcStandings(updatedPool(pool),r1Matches[pi])).flat();
    if(!r2Pools) return r1rows;
    const r2rows = r2Pools.map((pool,pi)=>calcStandings(updatedPool(pool),r2Matches[pi])).flat();
    const m={};
    [...r1rows,...r2rows].forEach(p=>{
      if(!m[p.id]){m[p.id]={...p};}
      else{m[p.id].w+=p.w;m[p.id].l+=p.l;m[p.id].pd+=p.pd;}
    });
    // Apply updated names to merged results
    Object.values(m).forEach(p => {
      const up = players.find(u => u.id===p.id);
      if(up) p.name = up.name;
    });
    const sorted = Object.values(m).sort((a,b)=>b.w-a.w||b.pd-a.pd);

    if(finalMatch&&finalMatch.done){
      const [fs1,fs2]=finalMatch.score;
      const winnerIds = (fs1>fs2?finalMatch.t1:finalMatch.t2).map(p=>p.id);
      const loserIds  = (fs1>fs2?finalMatch.t2:finalMatch.t1).map(p=>p.id);
      const winners = sorted.filter(p=>winnerIds.includes(p.id));
      const losers  = sorted.filter(p=>loserIds.includes(p.id));
      const rest    = sorted.filter(p=>!winnerIds.includes(p.id)&&!loserIds.includes(p.id));
      // Group rest by tied record: players with same w-l share a finish position
      return [...winners,...losers,...rest];
    }
    return sorted;
  };

  // Build place labels accounting for ties (same w-l = same place)
  const getPlaceLabels = (rows, finalDone, winnerIds, loserIds) => {
    // Ordinal helper
    const ord = n => {
      if(n===1)return "1st"; if(n===2)return "2nd"; if(n===3)return "3rd";
      return n+"th";
    };

    const finalist = new Set([...(winnerIds||[]),...(loserIds||[])]);
    const rest = rows.filter(p => !finalist.has(p.id));

    // Group rest by identical W-L record
    const groups = [];
    rest.forEach(p => {
      const last = groups[groups.length-1];
      if(last && last[0].w===p.w && last[0].l===p.l) last.push(p);
      else groups.push([p]);
    });

    // Assign consecutive place numbers — each group is one place after the last
    // 1st & 2nd taken by finalists, so rest starts at 3
    const groupPlaces = [];
    let nextPlace = finalDone ? 3 : 1;
    groups.forEach(grp => {
      groupPlaces.push({ place: nextPlace, size: grp.length, ids: grp.map(p=>p.id) });
      nextPlace += 1; // always increment by 1, not by group size
    });

    // Build label for each row
    return rows.map(p => {
      if(finalDone && (winnerIds||[]).includes(p.id)) return "1st";
      if(finalDone && (loserIds||[]).includes(p.id))  return "2nd";
      const gp = groupPlaces.find(g => g.ids.includes(p.id));
      if(!gp) return "–";
      // Show "T-3rd" only when multiple players share that place
      const prefix = gp.size > 1 ? "T-" : "";
      return prefix + ord(gp.place);
    });
  };

  const phaseBadgeColor = phase==="r1"?C.gold:phase==="r2"?C.blue:C.green;
  const phaseName = phase==="r1"?"Round 1":phase==="r2"?"Round 2":"Final";

  const resetScores = () => {
    if (!window.confirm("Reset all scores and player names?")) return;
    // Clear ALL localStorage for this division
    try {
      localStorage.removeItem(sk+'-r1matches');
      localStorage.removeItem(sk+'-r2pools');
      localStorage.removeItem(sk+'-r2matches');
      localStorage.removeItem(sk+'-final');
      localStorage.removeItem(sk+'-phase');
      localStorage.removeItem(sk+'-tab');
      localStorage.removeItem(sk+'-players');
    } catch(e) {}
    // Reload page so fresh default players load
    window.location.reload();
  };

  const MainTabs = () => {
    const tabs=[
      {id:"score", label:phase==="final"?"🏆 Final":"📊 Score"},
      {id:"standings", label:"🏅 Standings"},
      ...(phase==="r2"?[{id:"r1recap",label:"R1 Recap"}]:[]),
      ...(adminMode?[{id:"roster", label:"✏️ Roster"}]:[]),
    ];
    return (
      <div style={{display:"flex",borderBottom:`2px solid ${C.blue}22`,background:C.white,overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setMainTab(t.id)} style={{
            flex:1,padding:"9px 4px",border:"none",whiteSpace:"nowrap",
            borderBottom:mainTab===t.id?`3px solid ${C.gold}`:"3px solid transparent",
            background:"none",color:mainTab===t.id?C.navy:"#999",
            fontWeight:800,fontSize:11,cursor:"pointer",minWidth:56 }}>
            {t.label}
          </button>
        ))}
      </div>
    );
  };

  return (
    <div style={{background:C.white,borderRadius:15,overflow:"hidden",
      boxShadow:"0 2px 18px #0002",marginBottom:20}}>
      {/* Division header */}
      <div style={{background:`linear-gradient(135deg,${C.dark} 55%,${C.navy})`,
        padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{color:C.gold,fontSize:10,fontWeight:800,letterSpacing:2,textTransform:"uppercase"}}>BOMB Series</div>
          <div style={{color:C.white,fontSize:16,fontWeight:900,lineHeight:1.2}}>{div.name}</div>
          <div style={{color:`${C.blue}cc`,fontSize:11,marginTop:2}}>
            Courts {div.courtA} & {div.courtB} · {fmt12(div.startTime)}
          </div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {/* R1 / R2 toggle */}
          {["r1",...(r2Pools?["r2"]:[]),...(finalMatch?["final"]:[])].map(p=>(
            <button key={p} onClick={()=>{ if(p!=="final"||finalMatch) setPhase(p); setMainTab("score"); }}
              style={{
                padding:"4px 10px", borderRadius:8, border:"none", cursor:"pointer",
                fontSize:11, fontWeight:800,
                background: phase===p
                  ? (p==="r1"?C.gold:p==="r2"?C.blue:C.green)
                  : `${C.white}22`,
                color: phase===p ? C.dark : `${C.white}88`,
              }}>
              {p==="r1"?"R1":p==="r2"?"R2":"Final"}
            </button>
          ))}
        </div>
      </div>

      <MainTabs/>

      {/* Score tab */}
      {mainTab==="score"&&(
        <>
          {phase==="r1"&&(
            <PoolView pools={r1Pools} matches={r1Matches} setMatches={setR1Matches}
              label="R1" players={players} onRenamePlayer={renamePlayer} phase="r1" adminMode={adminMode}/>
          )}
          {phase==="r2"&&r2Pools&&(
            <PoolView pools={r2Pools} matches={r2Matches} setMatches={setR2Matches}
              label="R2" players={players} onRenamePlayer={renamePlayer} phase="r2" adminMode={adminMode}/>
          )}
          {phase==="final"&&(
            <FinalScreen match={finalMatch} onScore={handleFinalScore} onUndo={handleFinalUndo}/>
          )}
          <div style={{padding:"0 14px 14px"}}>
            {phase==="r1"&&r1Done&&(
              <button onClick={advanceR2} style={{width:"100%",padding:12,borderRadius:11,
                background:C.blue,color:C.white,fontSize:14,fontWeight:900,
                border:"none",cursor:"pointer"}}>Advance to Round 2 →</button>
            )}
            {phase==="r2"&&r2Done&&!finalMatch&&(
              <button onClick={advanceFinal} style={{width:"100%",padding:12,borderRadius:11,
                background:C.gold,color:C.dark,fontSize:14,fontWeight:900,
                border:"none",cursor:"pointer"}}>🏆 Start Final Game →</button>
            )}
          </div>
        </>
      )}

      {/* Standings tab */}
      {mainTab==="standings"&&(
        <div style={{padding:14}}>
          <div style={{fontSize:12,fontWeight:800,color:C.navy,marginBottom:8}}>
            {finalMatch&&finalMatch.done?"🏅 Final Standings":"Overall Standings"}
          </div>
          {(()=>{
            const rows = getOverallStandings();
            const finalDone = !!(finalMatch&&finalMatch.done);
            const [fs1,fs2] = finalMatch?finalMatch.score:[0,0];
            const winnerIds = finalDone?(fs1>fs2?finalMatch.t1:finalMatch.t2).map(p=>p.id):[];
            const loserIds  = finalDone?(fs1>fs2?finalMatch.t2:finalMatch.t1).map(p=>p.id):[];
            const placeLabels = getPlaceLabels(rows, finalDone, winnerIds, loserIds);
            return (
              <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${C.blue}33`,marginBottom:10}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:C.navy,color:C.white}}>
                      <th style={{padding:"7px 8px",textAlign:"left",fontWeight:800}}>#</th>
                      <th style={{padding:"7px 8px",textAlign:"left",fontWeight:800}}>Player</th>
                      <th style={{padding:"7px 6px",textAlign:"center",fontWeight:800}}>W-L</th>
                      <th style={{padding:"7px 6px",textAlign:"center",fontWeight:800}}>±</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((p,i)=>{
                      const lbl = placeLabels[i];
                      const is1 = lbl==="1st", is2 = lbl==="2nd";
                      const is3 = lbl==="3rd"||lbl==="T-3rd";
                      const medal = finalDone?(is1?"🥇":is2?"🥈":is3?"🥉":null):null;
                      return (
                        <tr key={p.id||i} style={{background:i%2===0?C.white:C.gray,borderBottom:`1px solid ${C.blue}18`}}>
                          <td style={{padding:"6px 8px",fontWeight:800,fontSize:12,
                            color:is1?C.gold:is2?"#aaa":C.dark,whiteSpace:"nowrap"}}>
                            {medal?`${medal} `:""}{ lbl}
                          </td>
                          <td style={{padding:"6px 8px",fontWeight:600,color:C.dark,fontSize:12}}>{p.name}</td>
                          <td style={{padding:"6px 6px",textAlign:"center",color:C.dark,fontSize:12}}>{p.w}-{p.l}</td>
                          <td style={{padding:"6px 6px",textAlign:"center",fontWeight:700,fontSize:12,
                            color:p.pd>0?C.green:p.pd<0?C.red:"#888"}}>
                            {p.pd>0?"+":""}{p.pd}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          })()}
        </div>
      )}

      {/* R1 Recap */}
      {mainTab==="r1recap"&&r2Pools&&(
        <div style={{padding:14}}>
          <div style={{fontSize:12,fontWeight:800,color:C.navy,marginBottom:10}}>Round 2 Pool Draw</div>
          {r2Pools.map((pool,pi)=>(
            <div key={pi} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:800,color:C.blue,marginBottom:5}}>
                Pool {String.fromCharCode(65+pi)}
              </div>
              {pool.map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",
                  padding:"5px 10px",background:C.gray,borderRadius:7,marginBottom:4,fontSize:12}}>
                  <span style={{fontWeight:600,color:C.dark}}>{p.name}</span>
                  <span style={{color:C.blue,fontWeight:700}}>R1: {p.r1Rank}{["st","nd","rd","th"][Math.min((p.r1Rank||1)-1,3)]}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {/* Roster tab */}
      {mainTab==="roster"&&adminMode&&(
        <div>
          <RosterEditor players={players} onRename={renamePlayer}/>
          {/* Admin controls — safe zone */}
          <div style={{margin:"0 14px 20px",padding:14,background:"#FFF5F5",
            borderRadius:12,border:`1px solid ${C.red}33`}}>
            <div style={{fontSize:11,fontWeight:800,color:C.red,marginBottom:10,
              textTransform:"uppercase",letterSpacing:1}}>⚙️ Admin Controls</div>
            {/* Round navigation */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#666",marginBottom:6}}>Switch Round</div>
              <div style={{display:"flex",gap:6}}>
                {["r1",...(r2Pools?["r2"]:[]),...(finalMatch?["final"]:[])].map(p=>(
                  <button key={p} onClick={()=>{ setPhase(p); setMainTab("score"); }}
                    style={{
                      flex:1,padding:"8px 4px",borderRadius:8,border:"none",cursor:"pointer",
                      fontSize:12,fontWeight:800,
                      background:phase===p?(p==="r1"?C.gold:p==="r2"?C.blue:C.green):"#E5E7EB",
                      color:phase===p?C.dark:"#6B7280",
                    }}>
                    {p==="r1"?"Round 1":p==="r2"?"Round 2":"Final"}
                  </button>
                ))}
              </div>
            </div>
            {/* Reset button */}
            <button onClick={resetScores} style={{
              width:"100%",padding:"10px",borderRadius:10,cursor:"pointer",
              background:`${C.red}15`,border:`1.5px solid ${C.red}44`,
              color:C.red,fontSize:13,fontWeight:900,
            }}>🗑 Reset All Scores (Keep Player Names)</button>
            <div style={{fontSize:10,color:"#999",textAlign:"center",marginTop:6}}>
              This will clear all scores and return to Round 1
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Build both divisions from presets ─────────────────────────────────────
const buildDivisions = () => DIVISION_PRESETS.map((preset, di) => ({
  name: preset.name,
  courtA: preset.courts[0],
  courtB: preset.courts[1],
  startTime: "19:00",
  players: preset.players.map((name, i) => ({
    id: `${di}-p${i}`, name, seed: i + 1,
  })),
}));

// ── Root App ───────────────────────────────────────────────────────────────
function DisneyScorer() {
  const [divisions]               = useState(buildDivisions);
  const [activeDiv, setActiveDiv] = useState(0);
  const [appTab,    setAppTab]    = useState("div");
  const [divStates, setDivStates] = useState([null, null]);
  const [adminMode, setAdminMode] = useState(false);
  const tapCount = useRef(0);
  const tapTimer = useRef(null);

  const handleLogoTap = () => {
    tapCount.current += 1;
    clearTimeout(tapTimer.current);
    tapTimer.current = setTimeout(() => { tapCount.current = 0; }, 600);
    if (tapCount.current >= 3) {
      tapCount.current = 0;
      setAdminMode(prev => !prev);
    }
  };

  return (
    <div style={{minHeight:"100vh",background:C.gray}}>
      <style>{css}</style>

      {/* Top bar */}
      <div style={{background:`linear-gradient(135deg,${C.dark},${C.navy})`,
        padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",
        position:"relative",top:"auto",zIndex:10}}>
        <div onClick={handleLogoTap} style={{userSelect:"none"}}>
          <div style={{color:C.gold,fontWeight:900,fontSize:15,lineHeight:1}}>
            🏰 Disney Day{adminMode && <span style={{fontSize:9,color:C.orange,marginLeft:5}}>✎ ADMIN</span>}
          </div>
          <div style={{color:`${C.blue}cc`,fontSize:10,fontWeight:600}}>Best of Mesquite Beach</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:C.white,fontWeight:900,fontSize:16,lineHeight:1}}>June 27</div>
          <div style={{color:`${C.blue}cc`,fontWeight:700,fontSize:11,marginTop:2}}>2026</div>
        </div>
      </div>

// ── Compute leaderboard ────────────────────────────────────────────────────
const buildLeaderboard = (divKey) => {
  const totals = {};
  const eventPoints = {};

  EVENTS.forEach(ev => {
    const key = `${ev.id}-${divKey}`;
    const results = RESULTS[key] || [];
    results.forEach(({ place, players }) => {
      const pts = getPoints(place);
      players.forEach(name => {
        if (!totals[name]) { totals[name] = 0; eventPoints[name] = {}; }
        totals[name] += pts;
        eventPoints[name][ev.id] = { pts, place };
      });
    });
  });

  return Object.entries(totals)
    .map(([name, total]) => ({ name, total, events: eventPoints[name] || {} }))
    .sort((a,b) => b.total - a.total);
};

// ── Leaderboard Table ──────────────────────────────────────────────────────
const LeaderboardTable = ({ divKey, selectedEvent }) => {
  const players = buildLeaderboard(divKey);

  // If event selected, sort by that event's points
  const sorted = selectedEvent
    ? [...players].sort((a,b) => {
        const ap = a.events[selectedEvent.id]?.pts || 0;
        const bp = b.events[selectedEvent.id]?.pts || 0;
        return bp - ap || b.total - a.total;
      })
    : players;

  const ranked = sorted.filter(p =>
    selectedEvent ? p.events[selectedEvent.id] : true
  );

  if (ranked.length === 0) return (
    <div style={{padding:32,textAlign:"center",color:"#9CA3AF",fontSize:14}}>
      No results yet for this event 🏐
    </div>
  );

  return (
    <div style={{borderRadius:12,overflow:"hidden",border:`1px solid #E5E7EB`,margin:"0 12px 16px"}}>
      <table style={{width:"100%",borderCollapse:"collapse"}}>

        </thead>

            <PlayerRow key={p.name} player={p} rank={i+1} selectedEvent={selectedEvent}/>

  );

      <div style={{display:"flex",background:C.white,borderBottom:`2px solid ${C.blue}22`,overflowX:"auto"}}>
        {divisions.map((d,i)=>(
          <button key={i} onClick={()=>{setActiveDiv(i);setAppTab("div");}} style={{
            flex:1,padding:"10px 6px",border:"none",
            borderBottom:appTab==="div"&&activeDiv===i?`3px solid ${C.gold}`:"3px solid transparent",
            background:"none",color:appTab==="div"&&activeDiv===i?C.navy:"#999",
            fontWeight:800,fontSize:11,cursor:"pointer",lineHeight:1.3,whiteSpace:"nowrap"}}>
            <div>{d.name}</div>
            <div style={{fontSize:9,fontWeight:600,
              color:appTab==="div"&&activeDiv===i?C.blue:"#bbb",marginTop:1}}>
              Courts {d.courtA} & {d.courtB}
            </div>
          </button>
        ))}
        {adminMode && (
          <button onClick={()=>setAppTab("td")} style={{
            flexShrink:0,padding:"10px 12px",border:"none",
            borderBottom:appTab==="td"?`3px solid ${C.orange}`:"3px solid transparent",
            background:"none",color:appTab==="td"?C.orange:"#999",
            fontWeight:800,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>
            📋 TD
          </button>
        )}
      </div>

      <div style={{padding:"14px 12px",maxWidth:580,margin:"0 auto"}}>
        {appTab==="div" && divisions.map((div, i) => (
          <div key={i} style={{display: activeDiv===i ? "block" : "none"}}>
            <TournamentDiv div={div} adminMode={adminMode}
              onStateChange={(state)=>setDivStates(prev=>{const n=[...prev];n[i]=state;return n;})}/>
          </div>
        ))}
        {appTab==="td" && adminMode && (
          <TDView divisionStates={divStates}/>
        )}
      </div>
    </div>
  );
}

const EVENTS_LIST = [
  {id:"tropical-luau",   name:"Tropical Luau",    emoji:"🌺", date:"June 6",   color:"#E8523A", status:"done"},
  {id:"glow-crazy",      name:"Glow Crazy",        emoji:"✨", date:"June 12",  color:"#8B5CF6", status:"done"},
  {id:"disney-day",      name:"Disney Day",        emoji:"🏰", date:"June 27",  color:"#1B3A6B", status:"done"},
  {id:"serves-stripes",  name:"Serves & Stripes",  emoji:"🇺🇸", date:"July 4",   color:"#DC2626", status:"done"},
  {id:"rockn-roll",      name:"Rock n Roll",       emoji:"🎸", date:"July 11",  color:"#1F2937", status:"next"},
  {id:"country-western", name:"Country Western",   emoji:"🤠", date:"July 18",  color:"#92400E", status:"upcoming"},
  {id:"christmas-july",  name:"Christmas in July", emoji:"🎄", date:"July 25",  color:"#16A34A", status:"upcoming"},
  {id:"gold-rush",       name:"Gold Rush",         emoji:"💰", date:"Aug 1",    color:"#B45309", status:"upcoming"},
];

function HomeScreen({onNav}) {
  return (
    <div style={{minHeight:"100vh",background:"#F0F4F8",fontFamily:"system-ui,-apple-system,sans-serif"}}>
      <div style={{background:"white",padding:"20px 20px 16px",textAlign:"center",borderBottom:"1px solid #E5E7EB",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",overflow:"hidden"}}>
        <div style={{width:140,height:101,margin:"0 auto 8px",overflow:"hidden",borderRadius:4}}>
          <img src={"data:image/jpeg;base64,"+LOGO_B64} alt="BOMB" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
        </div>
        <div style={{color:"#1B3A6B",fontSize:22,fontWeight:900,letterSpacing:1}}>BOMB Series</div>
        <div style={{color:"#4A9FD4",fontSize:12,fontWeight:600,marginTop:2}}>Best of Mesquite Beach · Summer 2026</div>
      </div>
      <div style={{padding:"14px 12px"}}>
        <div style={{fontSize:10,fontWeight:800,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>🏆 Season Standings</div>
        <button onClick={()=>onNav("leaderboard")} style={{width:"100%",background:"linear-gradient(135deg,#0D1F3C,#1B3A6B)",borderRadius:14,padding:"14px 16px",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:14,marginBottom:16,boxShadow:"0 4px 16px rgba(27,58,107,0.3)"}}>
          <div style={{fontSize:28}}>🏆</div>
          <div style={{textAlign:"left"}}>
            <div style={{color:"#F5A623",fontWeight:900,fontSize:16}}>Season Leaderboard</div>
            <div style={{color:"#4A9FD4",fontSize:12,marginTop:2}}>All divisions · Updated after each event</div>
          </div>
          <div style={{marginLeft:"auto",color:"#F5A623",fontSize:18}}>→</div>
        </button>
        <div style={{fontSize:10,fontWeight:800,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>📅 2026 Events</div>
        {EVENTS_LIST.map(ev=>{
          const done=ev.status==="done", scoring=ev.status==="scoring";
          const clickable = done || scoring;
          return (
            <button key={ev.id} onClick={()=>clickable?onNav(done?"past":"scoring",ev.id):null}
              style={{width:"100%",background:"white",borderRadius:12,padding:"12px 14px",border:"1.5px solid "+(done?ev.color+"44":scoring?"#DC262644":"#E5E7EB"),cursor:clickable?"pointer":"default",display:"flex",alignItems:"center",gap:12,marginBottom:8,opacity:clickable?1:0.55,boxShadow:clickable?"0 2px 8px rgba(0,0,0,0.06)":"none",textAlign:"left"}}>
              <div style={{width:44,height:44,borderRadius:10,fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",background:done?ev.color+"18":scoring?ev.color+"18":"#F3F4F6"}}>{ev.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14,color:clickable?ev.color:"#9CA3AF"}}>{ev.name}</div>
                <div style={{fontSize:11,color:"#9CA3AF",marginTop:2}}>{ev.date}, 2026</div>
              </div>
              <div style={{fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20,background:done?"#DCFCE7":scoring?"#FEE2E2":"#F3F4F6",color:done?"#16A34A":scoring?"#DC2626":"#9CA3AF",whiteSpace:"nowrap"}}>{done?"Results ✓":scoring?"Live 🔴":"Soon"}</div>
            </button>
          );
        })}
      </div>
      <div style={{textAlign:"center",padding:16,color:"#9CA3AF",fontSize:11}}>💣 BOMB Series · Best of Mesquite Beach · Gilbert, AZ</div>
    </div>
  );
}

function LeaderboardWithBack({onBack}) {
  return (
    <div style={{minHeight:"100vh",background:"#F0F4F8",fontFamily:"system-ui,-apple-system,sans-serif"}}>
      <div style={{background:"linear-gradient(135deg,#0D1F3C,#1B3A6B)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",fontSize:13,fontWeight:800,cursor:"pointer",borderRadius:8,padding:"6px 12px",whiteSpace:"nowrap"}}>⌂ Home</button>
        <div style={{color:"#F5A623",fontWeight:900,fontSize:16}}>🏆 Season Leaderboard</div>
      </div>
      <LeaderboardApp/>
    </div>
  );
}

function ScoringWrapper({eventId, onBack}) {
  if (eventId==="serves-stripes") return (
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif"}}>
      <StripesScorer/>
    </div>
  );
  return (
    <div style={{minHeight:"100vh",background:"#F0F4F8"}}>
      <div style={{background:"linear-gradient(135deg,#0D1F3C,#1B3A6B)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",fontSize:13,fontWeight:800,cursor:"pointer",borderRadius:8,padding:"6px 12px",whiteSpace:"nowrap"}}>⌂ Home</button>
        <div style={{color:"#F5A623",fontWeight:900,fontSize:16}}>📊 Coming Soon</div>
      </div>
      <div style={{padding:32,textAlign:"center",color:"#9CA3AF"}}>
        <div style={{fontSize:40,marginBottom:8}}>🚧</div>
        <div style={{fontWeight:700,fontSize:16}}>Scoring coming soon!</div>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("home");
  const [params, setParams] = useState({});
  const onNav = (s, id) => { setParams(id?{id}:{}); setScreen(s); };
  const goHome = () => setScreen("home");
  if (screen==="home") return <HomeScreen onNav={onNav}/>;
  if (screen==="leaderboard") return <LeaderboardWithBack onBack={goHome}/>;
  if (screen==="past") return <PastEventPage eventKey={params.id} onBack={goHome}/>;
  if (screen==="scoring") return <ScoringWrapper eventId={params.id} onBack={goHome}/>;
  return <HomeScreen onNav={onNav}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
